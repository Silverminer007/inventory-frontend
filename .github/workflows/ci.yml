name: Build and Push Docker Image

on:
  push:
    branches:
      - master
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/inventory-frontend

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  calculate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.version.outputs.VERSION}}
      image: ${{steps.version.outputs.IMAGE}}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        if: github.ref == 'refs/heads/master'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Semantic Release
        if: github.ref == 'refs/heads/master'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer

      - name: 🚀 Run Semantic Release (GitHub only)
        if: github.ref == 'refs/heads/master'
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --plugins \
            @semantic-release/commit-analyzer

      - name: Calculate Image Name and Version tag
        id: version
        run: |
          REPO_OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            VERSION=$(git tag --sort=-creatordate | head -1)
          else
            VERSION="develop-$(echo ${{ github.sha }} | cut -c1-8)"  # develop-a1b2c3d4
          fi

          IMAGE=ghcr.io/$REPO_OWNER_LC/inventory-frontend

          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "**Image**: $IMAGE:$VERSION" >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ github.token }}

  docker-build:
    needs:
     - code-quality
     - e2e-test
     - calculate-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Docker Image
        run: |
          docker build -t ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}} -f Dockerfile .
          docker push ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Re-tag Docker Image (latest)
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Tagging as ${{needs.calculate-version.outputs.image}}:latest ..."
          docker tag ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}} ${{needs.calculate-version.outputs.image}}:latest

          echo "Pushing ${{needs.calculate-version.outputs.image}}:latest ..."
          docker push ${{needs.calculate-version.outputs.image}}:latest

      - name: 📦 Re-tag Docker Image (develop)
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Tagging as ${{needs.calculate-version.outputs.image}}:develop ..."
          docker tag ${{needs.calculate-version.outputs.image}}:${{needs.calculate-version.outputs.version}} ${{needs.calculate-version.outputs.image}}:develop

          echo "Pushing ${{needs.calculate-version.outputs.image}}:develop ..."
          docker push ${{needs.calculate-version.outputs.image}}:develop

  deploy:
    needs:
      - docker-build
      - calculate-version
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Trigger Production Deployment
        if: github.ref == 'refs/heads/master'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/inventory-deployment/dispatches \
            -d '{
              "event_type":"deploy-production",
              "client_payload":{
                "service":"frontend",
                "version":"${{needs.calculate-version.outputs.version}}",
                "image":"${{needs.calculate-version.outputs.image}}"
              }
            }'

      - name: 🧪 Trigger Staging Deployment
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DEPLOYMENT_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/silverminer007/inventory-deployment/dispatches \
            -d '{
              "event_type":"deploy-staging",
              "client_payload":{
                "service":"frontend",
                "version":"${{needs.calculate-version.outputs.version}}",
                "image":"${{needs.calculate-version.outputs.image}}"
              }
            }'
